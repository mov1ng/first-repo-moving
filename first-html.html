<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦌</text></svg>">
    <title>moving | 个人主页</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(120deg, #e8edf2, #f5f0eb);
            color: #333;
            line-height: 1.7;
            padding: 40px 20px;
            transition: all 0.3s ease;
        }

        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 48px;
            height: 48px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            z-index: 100;
        }

        .menu-btn span {
            display: block;
            width: 24px;
            height: 2px;
            background: #333;
            border-radius: 1px;
            transition: 0.3s;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: #fff;
            border-radius: 0 24px 24px 0;
            box-shadow: 4px 0 30px rgba(0,0,0,0.05);
            padding: 60px 30px;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 99;
        }

        .sidebar.active {
            transform: translateX(0);
        }

        .sidebar a {
            display: block;
            padding: 14px 16px;
            margin-bottom: 10px;
            border-radius: 16px;
            color: #333;
            text-decoration: none;
            font-size: 16px;
            transition: background 0.2s;
        }

        .sidebar a:hover {
            background: #f5f7fa;
        }

        .mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0,0,0,0.2);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 98;
        }

        .mask.active {
            opacity: 1;
            visibility: visible;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        header {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            margin-bottom: 30px;
        }

        /* 头像样式：适配图片 */
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 30px; /* 圆滑边缘，苹果风格 */
            overflow: hidden; /* 让图片超出部分被裁掉，保持圆角 */
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #dce4ec, #eef2f5);
        }

        /* 图片样式：撑满容器，不变形 */
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 28px;
            font-weight: 500;
            color: #222;
            margin-bottom: 8px;
        }

        .school-info {
            font-size: 16px;
            color: #666;
        }

        section {
            background: #fff;
            border-radius: 24px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
        }

        h2 {
            font-size: 20px;
            font-weight: 500;
            color: #333;
            margin-bottom: 15px;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            display: inline-block;
            padding: 12px 28px;
            margin: 0 10px;
            background-color: #eef2f7;
            color: #333;
            text-decoration: none;
            border-radius: 16px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .links a:hover {
            background-color: #dde4ee;
        }
        /* 小鹿装饰图标 */
.deer-icon {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 60px;
  height: 60px;
  font-size: 40px;
  cursor: pointer;
  z-index: 100;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15));
  transition: transform 0.1s ease;
}
.deer-icon.clicked {
  animation: shake 0.4s ease;
}
@keyframes shake {
  0% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(-15deg) scale(1.1); }
  50% { transform: rotate(15deg) scale(1.1); }
  75% { transform: rotate(-10deg) scale(1.05); }
  100% { transform: rotate(0deg) scale(1); }
}
    </style>
</head>
<div class="deer-icon" id="deerIcon">🦌</div>
<body>
    <div class="menu-btn" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="sidebar" id="sidebar">
        <a href="#">首页</a>
        <a href="#">关于我</a>
        <a href="#">技能列表</a>
        <a href="#">项目作品</a>
        <a href="#">联系我</a>
    </div>

    <div class="mask" id="mask"></div>

    <div class="container">
        <header>
            <!-- line 144: 这里改成了图片标签 -->
            <div class="avatar">
                <img src="avatar.jpg" alt="头像">
            </div>
            <h1>moving</h1>
            <p class="school-info">白城师范学院 · 计算机科学与技术 23级</p>
        </header>

        <section>
            <h2>关于我</h2>
        </section>

        <div class="links">
            <a href="https://github.com/moving">GitHub</a>
            <a href="mailto:wyyid_demaporo@163.com">邮箱联系</a>
        </div>
    </div>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const mask = document.getElementById('mask');

        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('active');
            mask.classList.toggle('active');
        });

        mask.addEventListener('click', () => {
            sidebar.classList.remove('active');
            mask.classList.remove('active');
        });
        // 小鹿点击动画
const deerIcon = document.getElementById('deerIcon');
deerIcon.addEventListener('click', () => {
  deerIcon.classList.add('clicked');
  setTimeout(() => deerIcon.classList.remove('clicked'), 400);
});
    </script>
</body>
</html>
