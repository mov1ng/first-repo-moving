<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", sans-serif;
        }
    </style>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦌</text></svg>">
    <title>moving | 个人主页</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(120deg, #e8edf2, #f5f0eb);
            color: #333;
            line-height: 1.7;
            padding: 40px 20px;
            transition: all 0.3s ease;
        }

        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 48px;
            height: 48px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            z-index: 100;
        }

        .menu-btn span {
            display: block;
            width: 24px;
            height: 2px;
            background: #333;
            border-radius: 1px;
            transition: 0.3s;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: #fff;
            border-radius: 0 24px 24px 0;
            box-shadow: 4px 0 30px rgba(0, 0, 0, 0.05);
            padding: 60px 30px;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 99;
        }

        .sidebar.active {
            transform: translateX(0);
        }

        .sidebar a {
    display: block;
    padding: 14px 16px;
    margin-bottom: 10px;
    border-radius: 16px;
    color: #333;
    text-decoration: none;
    font-size: 16px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
}

.sidebar a::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    width: 0%;
    height: 100%;
    background: linear-gradient(to right, #d1d9e688, #f5f7fa);
    transition: width 0.3s ease;
    z-index: -1;
}

.sidebar a:hover::before {
    width: 100%;
}

        
        .mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.2);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 98;
        }

        .mask.active {
            opacity: 1;
            visibility: visible;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        header {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            margin-bottom: 30px;
        }

        /* 头像样式：适配图片 */
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 30px;
            /* 圆滑边缘，苹果风格 */
            overflow: hidden;
            /* 让图片超出部分被裁掉，保持圆角 */
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #dce4ec, #eef2f5);
        }

        /* 图片样式：撑满容器，不变形 */
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 28px;
            font-weight: 500;
            color: #222;
            margin-bottom: 8px;
        }

        .school-info {
            font-size: 16px;
            color: #666;
        }

        section {
            background: #fff;
            border-radius: 24px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
        }

        h2 {
            font-size: 20px;
            font-weight: 500;
            color: #333;
            margin-bottom: 15px;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            display: inline-block;
            padding: 12px 28px;
            margin: 0 10px;
            background-color: #eef2f7;
            color: #333;
            text-decoration: none;
            border-radius: 16px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .links a:hover {
            background-color: #dde4ee;
        }

        /* 小鹿装饰图标 */
        .deer-icon {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            font-size: 40px;
            cursor: pointer;
            z-index: 100;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.15));
            transition: transform 0.1s ease;
        }

        .deer-icon.clicked {
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0% {
                transform: rotate(0deg) scale(1);
            }

            25% {
                transform: rotate(-15deg) scale(1.1);
            }

            50% {
                transform: rotate(15deg) scale(1.1);
            }

            75% {
                transform: rotate(-10deg) scale(1.05);
            }

            100% {
                transform: rotate(0deg) scale(1);
            }
        }
    </style>
</head>
<div class="deer-icon" id="deerIcon">🦌</div>

<body>
<div class="menu-btn" id="menuBtn" style="
  width: 45px;
  height: 45px;
  border-radius: 14px;
  background: #f5f7fa;
  box-shadow: 3px 3px 6px #d1d9e6, -2px -2px 5px #ffffff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  cursor: pointer;
">
  <span style="width: 22px; height: 2px; background: #666; border-radius: 1px;"></span>
  <span style="width: 22px; height: 2px; background: #666; border-radius: 1px;"></span>
  <span style="width: 22px; height: 2px; background: #666; border-radius: 1px;"></span>
</div>
    <!-- 优化后的时间戳：加粗、居中对齐、字体放大、位置上移 -->
    <div id="time" style="position: fixed; right: 90px; bottom: 26px; font-size: 16px; font-weight: bold; color: #666;">
    </div>

    <script>
        function updateTime() {
            let now = new Date();
            document.getElementById("time").innerText = now.toLocaleString();
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
    <div class="sidebar" id="sidebar">
        <a href="#">首页</a>
        <a href="#">关于我</a>
        <a href="#">技能列表</a>
        <a href="#">项目作品</a>
        <a href="#">联系我</a>
    </div>

    <div class="mask" id="mask"></div>

    <div class="container">
        <header>
            <!-- line 144: 这里改成了图片标签 -->
            <div class="avatar">
                <img src="avatar.jpg" alt="头像">
            </div>
            <h1>moving</h1>
            <p class="school-info">白城师范学院 · 计算机科学与技术 23级</p>
        </header>

        <section>
            <!-- 关于我 -->
            <div
                style="margin-top: 30px; text-align: center; font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;">
                <h2 style="font-size: 22px; font-weight: 600; color: #222;">学生学习记录</h2>
                <p style="font-size: 15px; color: #555; margin-top: 8px;">持续学习，持续进步</p>
            </div>
        </section>

        <div class="links">
            <a href="https://github.com/moving" style="
  display: inline-block;
  padding: 12px 24px;
  margin: 0 8px;
  border-radius: 16px;
  background: #f5f7fa;
  color: #333;
  text-decoration: none;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s ease;
  /* 上/左淡、下/右深的边框效果 */
  box-shadow: 3px 3px 6px #d1d9e6, -2px -2px 5px #ffffff;
" onmouseover="this.style.background='#eef0f4'; this.style.boxShadow='2px 2px 4px #d1d9e6, -1px -1px 3px #ffffff';"
                onmouseout="this.style.background='#f5f7fa'; this.style.boxShadow='3px 3px 6px #d1d9e6, -2px -2px 5px #ffffff';"
                onfocus="this.style.background='#eef0f4'; this.style.boxShadow='2px 2px 4px #d1d9e6, -1px -1px 3px #ffffff';"
                onblur="this.style.background='#f5f7fa'; this.style.boxShadow='3px 3px 6px #d1d9e6, -2px -2px 5px #ffffff';">GitHub</a>

            <a href="mailto:wyyid_demaporo@163.com" style="
  display: inline-block;
  padding: 12px 24px;
  margin: 0 8px;
  border-radius: 16px;
  background: #f5f7fa;
  color: #333;
  text-decoration: none;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s ease;
  /* 上/左淡、下/右深的边框效果 */
  box-shadow: 3px 3px 6px #d1d9e6, -2px -2px 5px #ffffff;
" onmouseover="this.style.background='#eef0f4'; this.style.boxShadow='2px 2px 4px #d1d9e6, -1px -1px 3px #ffffff';"
                onmouseout="this.style.background='#f5f7fa'; this.style.boxShadow='3px 3px 6px #d1d9e6, -2px -2px 5px #ffffff';"
                onfocus="this.style.background='#eef0f4'; this.style.boxShadow='2px 2px 4px #d1d9e6, -1px -1px 3px #ffffff';"
                onblur="this.style.background='#f5f7fa'; this.style.boxShadow='3px 3px 6px #d1d9e6, -2px -2px 5px #ffffff';">邮箱联系</a>
        </div>
    </div>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const mask = document.getElementById('mask');

        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('active');
            mask.classList.toggle('active');
        });

        mask.addEventListener('click', () => {
            sidebar.classList.remove('active');
            mask.classList.remove('active');
        });
        // 小鹿点击动画
        const deerIcon = document.getElementById('deerIcon');
        deerIcon.addEventListener('click', () => {
            deerIcon.classList.add('clicked');
            setTimeout(() => deerIcon.classList.remove('clicked'), 400);
        });
    </script>
</body>

</html>
