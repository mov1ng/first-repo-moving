<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>moving | 个人主页</title>
    <style>
        /* 全局初始化 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            /* 油画柔和渐变背景 */
            background: linear-gradient(120deg, #e8edf2, #f5f0eb);
            color: #333;
            line-height: 1.7;
            padding: 40px 20px;
            transition: all 0.3s ease;
        }

        /* 汉堡菜单按钮 右上角 */
        .menu-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            z-index: 100;
        }

        /* 三条横线 */
        .menu-btn span {
            display: block;
            width: 24px;
            height: 2px;
            background: #333;
            border-radius: 1px;
            transition: 0.3s;
        }

        /* 侧边栏 */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: #fff;
            border-radius: 0 24px 24px 0;
            box-shadow: 4px 0 30px rgba(0,0,0,0.05);
            padding: 60px 30px;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 99;
        }

        /* 侧边栏展开状态 */
        .sidebar.active {
            transform: translateX(0);
        }

        /* 侧边栏导航链接 */
        .sidebar a {
            display: block;
            padding: 14px 16px;
            margin-bottom: 10px;
            border-radius: 16px;
            color: #333;
            text-decoration: none;
            font-size: 16px;
            transition: background 0.2s;
        }

        .sidebar a:hover {
            background: #f5f7fa;
        }

        /* 遮罩层 */
        .mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0,0,0,0.2);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 98;
        }

        .mask.active {
            opacity: 1;
            visibility: visible;
        }

        /* 主内容容器 */
        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        header {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            margin-bottom: 30px;
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 30px;
            background: linear-gradient(145deg, #dce4ec, #eef2f5);
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            color: #555;
        }

        h1 {
            font-size: 28px;
            font-weight: 500;
            color: #222;
            margin-bottom: 8px;
        }

        .school-info {
            font-size: 16px;
            color: #666;
        }

        section {
            background: #fff;
            border-radius: 24px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
        }

        h2 {
            font-size: 20px;
            font-weight: 500;
            color: #333;
            margin-bottom: 15px;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            display: inline-block;
            padding: 12px 28px;
            margin: 0 10px;
            background-color: #eef2f7;
            color: #333;
            text-decoration: none;
            border-radius: 16px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .links a:hover {
            background-color: #dde4ee;
        }
    </style>
</head>
<body>
    <!-- 汉堡菜单按钮 -->
    <div class="menu-btn" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
        <a href="#">首页</a>
        <a href="#">关于我</a>
        <a href="#">技能列表</a>
        <a href="#">项目作品</a>
        <a href="#">联系我</a>
    </div>

    <!-- 遮罩 -->
    <div class="mask" id="mask"></div>

    <div class="container">
        <header>
            <div class="avatar">👨‍💻</div>
            <h1>moving</h1>
            <p class="school-info">白城师范学院 · 计算机科学与技术 23级</p>
        </header>

        <section>
            <h2>关于我</h2>
            <!-- 简介留白 按你要求暂不填写 -->
        </section>

        <div class="links">
            <a href="https://github.com/moving">GitHub</a>
            <a href="mailto:wyyid_demaporo@163.com">邮箱联系</a>
        </div>
    </div>

    <script>
        // 获取元素
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const mask = document.getElementById('mask');

        // 点击展开/关闭侧边栏
        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('active');
            mask.classList.toggle('active');
        });

        // 点击遮罩关闭侧边栏
        mask.addEventListener('click', () => {
            sidebar.classList.remove('active');
            mask.classList.remove('active');
        });
    </script>
</body>
</html>
