<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦌</text></svg>">
    <title>moving | 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", sans-serif;
        }
        body {
            background: linear-gradient(120deg, #e8edf2, #f5f0eb);
            color: #333;
            line-height: 1.7;
            padding: 40px 20px;
        }
        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            border-radius: 14px;
            background: #f5f7fa;
            box-shadow: 3px 3px 6px #d1d9e6, -2px -2px 5px #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            z-index: 100;
        }
        .menu-btn span {
            width: 22px;
            height: 2px;
            background: #666;
            border-radius: 1px;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: #fff;
            border-radius: 0 24px 24px 0;
            box-shadow: 4px 0 30px rgba(0, 0, 0, 0.05);
            padding: 60px 30px;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 99;
        }
        .sidebar.active {
            transform: translateX(0);
        }
        .sidebar a {
            display: block;
            padding: 14px 16px;
            margin-bottom: 10px;
            border-radius: 16px;
            color: #333;
            text-decoration: none;
            font-size: 16px;
            position: relative;
            overflow: hidden;
        }
        .sidebar a::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, #d1d9e688, #f5f7fa);
            transition: width 0.3s ease;
            z-index: -1;
        }
        .sidebar a:hover::before {
            width: 100%;
        }
        .mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.2);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 98;
        }
        .mask.active {
            opacity: 1;
            visibility: visible;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
        }
        header {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            margin-bottom: 30px;
        }
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 30px;
            overflow: hidden;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #dce4ec, #eef2f5);
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h1 {
            font-size: 28px;
            font-weight: 500;
            color: #222;
            margin-bottom: 8px;
        }
        .school-info {
            font-size: 16px;
            color: #666;
        }
        section {
            background: #fff;
            border-radius: 24px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
        }
        h2 {
            font-size: 20px;
            font-weight: 500;
            color: #333;
            margin-bottom: 15px;
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            display: inline-block;
            padding: 12px 24px;
            margin: 0 8px;
            border-radius: 16px;
            background: #f5f7fa;
            color: #333;
            text-decoration: none;
            font-size: 16px;
            box-shadow: 3px 3px 6px #d1d9e6, -2px -2px 5px #ffffff;
        }
        .deer-icon {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            font-size: 40px;
            cursor: pointer;
            z-index: 100;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.15));
        }
        .deer-icon.clicked {
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-15deg) scale(1.1); }
            50% { transform: rotate(15deg) scale(1.1); }
            75% { transform: rotate(-10deg) scale(1.05); }
            100% { transform: rotate(0deg) scale(1); }
        }
               .control-btn:hover {
            filter: brightness(1.1);
        }
        .link-btn {
          transition: all 0.3s ease;
        }
        .link-btn:hover {
          background: #eef0f4 !important;
          box-shadow: 2px 2px 4px #d1d9e6, -1px -1px 3px #ffffff !important;
        }

    </style>
</head>
<body>
    <div class="deer-icon" id="deerIcon">🦌</div>

    <div class="menu-btn" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div id="time" style="position: fixed; right: 90px; bottom: 26px; font-size: 16px; font-weight: bold; color: #666;"></div>
    <!-- 右上角注册登录按钮 -->
<!-- 右上角注册登录按钮 定位不变 -->
<div style="position: fixed; top: 20px; right: 20px; z-index: 100;">
    <a href="#" class="link-btn" style="
        display: inline-block;
        padding: 8px 18px;
        border-radius: 16px;
        background: #f5f7fa;
        color: #333;
        text-decoration: none;
        font-size: 14px;
        box-shadow: 3px 3px 6px #d1d9e6, -2px -2px 5px #ffffff;
    ">注册 / 登录</a>
</div>

<div class="sidebar" id="sidebar">
    <a href="#">首页</a>
    <a href="#">关于我</a>
    <a href="#">作品展示</a>
    <a href="#">学习记录</a>
    <a href="#">学习打卡</a>
    <a href="#">联系我</a>
</div>
    <div class="mask" id="mask"></div>

    <div class="container">
        <!-- 三大金刚键（带原生title提示） -->
        <div style="
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        ">
            <div class="control-btn" title="个人主页" style="width:14px;height:14px;border-radius:50%;background:#ff5f57;cursor:pointer;"></div>
            <div class="control-btn" title="打卡" style="width:14px;height:14px;border-radius:50%;background:#28c840;cursor:pointer;"></div>
            <div class="control-btn" title="社区" style="width:14px;height:14px;border-radius:50%;background:#ffbd2e;cursor:pointer;"></div>
        </div>

        <header>
            <div class="avatar">
                <img src="avatar.jpg" alt="头像">
            </div>
            <h1>moving</h1>
            <p class="school-info">白城师范学院 · 计算机科学与技术 23级</p>
        </header>

        <section>
            <div style="text-align: center;">
                <h2 style="font-size: 22px; font-weight: 600; color: #222;">学生学习记录</h2>
                <p style="font-size: 15px; color: #555; margin-top: 8px;">持续学习，持续进步</p>
            </div>
        </section>

        <div class="links">
            <a href="https://github.com/moving" class="link-btn" style="padding:12px 24px; border-radius:16px; background:#f5f7fa; box-shadow:3px 3px 6px #d1d9e6, -2px -2px 5px #fff;">GitHub</a>
            <a href="mailto:wyyid_demaporo@163.com" class="link-btn" style="padding:12px 24px; border-radius:16px; background:#f5f7fa; box-shadow:3px 3px 6px #d1d9e6, -2px -2px 5px #fff;">邮箱联系</a>
        </div>
    </div>

    <script>
        // 时间
        function updateTime() {
            let now = new Date();
            document.getElementById("time").innerText = now.toLocaleString();
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 小鹿动画
        const deerIcon = document.getElementById('deerIcon');
        deerIcon.addEventListener('click', () => {
            deerIcon.classList.add('clicked');
            setTimeout(() => deerIcon.classList.remove('clicked'), 400);
        });

        // 汉堡菜单核心代码（之前就是少了这段！）
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const mask = document.getElementById('mask');

        // 点击汉堡按钮 → 打开/关闭侧边栏
        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('active');
            mask.classList.toggle('active');
        });

        // 点击遮罩 → 关闭侧边栏
        mask.addEventListener('click', () => {
            sidebar.classList.remove('active');
            mask.classList.remove('active');
        });
    </script>
</body>
</html>
